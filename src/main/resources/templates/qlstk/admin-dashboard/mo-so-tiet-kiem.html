<!DOCTYPE html>
<html lang="vi" class="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MỞ SỔ TIẾT KIỆM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="admin-dashboard/css/styles.css">
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen">
<div class="flex h-screen overflow-hidden">
    <aside class="w-72 bg-slate-900 text-slate-300 flex flex-col shadow-2xl">
        <div class="p-6 border-b border-slate-800">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-3 rounded-xl"><span class="material-icons-outlined text-white text-3xl">savings</span></div>
                <h1 class="text-white text-xl font-bold uppercase tracking-tight">Tiết kiệm</h1>
            </div>
        </div>
        <nav class="flex-1 px-3 py-6 overflow-y-auto space-y-8">
            <div>
                <p class="px-4 text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Chính</p>
                <ul class="space-y-1">
                    <li><a href="index.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg"><span class="material-icons-outlined">dashboard</span>Tổng quan</a></li>
                    <li><a href="mo-so-tiet-kiem.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg"><span class="material-icons-outlined">add_circle_outline</span>Mở sổ tiết kiệm</a></li>
                    <li><a href="quan-ly-khach-hang.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg"><span class="material-icons-outlined">group</span>Quản lý khách hàng</a></li>
                    <li><a href="quan-ly-loai-tiet-kiem.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg"><span class="material-icons-outlined">settings_suggest</span>Quản lý loại tiết kiệm</a></li>
                </ul>
            </div>
            <div>
                <p class="px-4 text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Nghiệp vụ</p>
                <ul class="space-y-1">
                    <li><a href="giao-dich.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg"><span class="material-icons-outlined">swap_horiz</span>Giao dịch (Gửi/Rút)</a></li>
                    <li><a href="tra-cuu-so.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg"><span class="material-icons-outlined">manage_search</span>Tra cứu sổ</a></li>
                    <li><a href="bao-cao-thong-ke.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg"><span class="material-icons-outlined">bar_chart</span>Báo cáo doanh số</a></li>
                </ul>
            </div>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto flex flex-col">
        <header class="h-16 bg-white border-b border-gray-200 px-8 flex items-center justify-between sticky top-0 z-10">
            <h2 class="text-xl font-bold text-slate-800">Lập phiếu mở sổ</h2>
        </header>

        <div class="p-8">
            <div class="max-w-4xl mx-auto bg-white rounded-2xl border border-gray-100 shadow-sm p-8">
                <form class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="col-span-2">
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Khách hàng</label>
                            <div class="relative">
                                <span class="material-icons-outlined absolute left-3 top-3 text-gray-400">person_search</span>
                                <input type="text" class="w-full border border-gray-200 pl-10 pr-4 py-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20" placeholder="Tìm tên hoặc mã khách hàng...">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Loại tiết kiệm</label>
                            <select class="w-full border border-gray-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20">
                                <option>Không kỳ hạn (0.15%/tháng)</option>
                                <option>Kỳ hạn 3 tháng (0.50%/tháng)</option>
                                <option>Kỳ hạn 6 tháng (0.55%/tháng)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Số tiền gửi (VNĐ)</label>
                            <input type="number" class="w-full border border-gray-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20" placeholder="Tối thiểu 1,000,000đ">
                        </div>
                    </div>
                    <div class="pt-6 border-t flex justify-end gap-3">
                        <button type="reset" class="px-6 py-2.5 border border-gray-200 rounded-xl hover:bg-gray-50 transition">Làm lại</button>
                        <button type="submit" class="px-6 py-2.5 bg-blue-600 text-white rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-200 transition">Xác nhận mở sổ</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
<script src="../../../static/css/js/script.js"></script>
</body>
</html>
