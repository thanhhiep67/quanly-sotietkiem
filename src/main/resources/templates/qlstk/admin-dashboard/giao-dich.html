<!DOCTYPE html>
<html lang="vi" class="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>GIAO DỊCH - Gửi & Rút tiền</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen">

<div class="flex h-screen overflow-hidden">
    <aside class="w-72 bg-slate-900 text-slate-300 flex flex-col shadow-2xl">
        <div class="p-6 border-b border-slate-800">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-3 rounded-xl">
                    <span class="material-icons-outlined text-white text-3xl">savings</span>
                </div>
                <h1 class="text-white text-xl font-bold uppercase tracking-tight">Tiết kiệm</h1>
            </div>
        </div>

        <nav class="flex-1 px-3 py-6 overflow-y-auto space-y-8">
            <div>
                <p class="px-4 text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Chính</p>
                <ul class="space-y-1">
                    <li><a href="index.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg"><span class="material-icons-outlined">dashboard</span>Tổng quan</a></li>
                    <li><a href="mo-so-tiet-kiem.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg"><span class="material-icons-outlined">add_circle_outline</span>Mở sổ tiết kiệm</a></li>
                    <li><a href="quan-ly-khach-hang.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg"><span class="material-icons-outlined">group</span>Quản lý khách hàng</a></li>
                    <li><a href="quan-ly-loai-tiet-kiem.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg"><span class="material-icons-outlined">settings_suggest</span>Quản lý loại tiết kiệm</a></li>
                </ul>
            </div>

            <div>
                <p class="px-4 text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Nghiệp vụ</p>
                <ul class="space-y-1">
                    <li><a href="giao-dich.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg"><span class="material-icons-outlined">swap_horiz</span>Giao dịch (Gửi/Rút)</a></li>
                    <li><a href="tra-cuu-so.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg"><span class="material-icons-outlined">manage_search</span>Tra cứu sổ</a></li>
                    <li><a href="bao-cao-thong-ke.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg"><span class="material-icons-outlined">bar_chart</span>Báo cáo doanh số</a></li>
                </ul>
            </div>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto flex flex-col">
        <header class="h-16 bg-white border-b border-gray-200 px-8 flex items-center sticky top-0 z-10">
            <h2 class="text-xl font-bold text-slate-800">Giao dịch Gửi/Rút tiền</h2>
        </header>

        <div class="p-8">
            <div class="max-w-4xl mx-auto bg-white rounded-2xl border border-gray-100 shadow-sm p-8">
                <div class="flex gap-4 mb-8">
                    <button class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold">PHIẾU GỬI TIỀN</button>
                    <button class="flex-1 py-3 bg-gray-100 text-gray-500 rounded-xl font-bold hover:bg-gray-200 transition">PHIẾU RÚT TIỀN</button>
                </div>

                <form class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="col-span-2">
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Mã sổ tiết kiệm</label>
                            <input type="text" class="w-full border border-gray-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20" placeholder="Nhập mã sổ (VD: STK-001)...">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Số tiền giao dịch</label>
                            <input type="number" class="w-full border border-gray-200 p-3 rounded-xl outline-none" placeholder="0đ">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Ngày thực hiện</label>
                            <input type="date" class="w-full border border-gray-200 p-3 rounded-xl outline-none" value="2026-01-16">
                        </div>
                    </div>
                    <div class="pt-6">
                        <button type="submit" class="w-full py-4 bg-blue-600 text-white rounded-xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition">Xác nhận giao dịch</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
<script src="../../../static/css/js/script.js"></script>
</body>
</html>
