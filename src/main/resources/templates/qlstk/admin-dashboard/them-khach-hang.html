<!DOCTYPE html>
<html lang="vi" class="light" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>THÊM KHÁCH HÀNG</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/admin-dashboard/css/styles.css">
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen">
<div class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-72 bg-slate-900 text-slate-300 flex flex-col shadow-2xl">
        <div class="p-6 border-b border-slate-800">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-3 rounded-xl">
                    <span class="material-icons-outlined text-white text-3xl">savings</span>
                </div>
                <h1 class="text-white text-xl font-bold uppercase tracking-tight">Tiết kiệm</h1>
            </div>
        </div>
        <nav class="flex-1 px-3 py-6 overflow-y-auto space-y-8">
            <div>
                <p class="px-4 text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Chính</p>
                <ul class="space-y-1">
                    <li><a href="/admin" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg">
                        <span class="material-icons-outlined">dashboard</span>Tổng quan</a></li>
                    <li><a href="/admin/mo-so" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg">
                        <span class="material-icons-outlined">add_circle_outline</span>Mở sổ tiết kiệm</a></li>
                    <li><a href="/admin/quan-ly-khach-hang" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg">
                        <span class="material-icons-outlined">group</span>Quản lý khách hàng</a></li>
                    <li><a href="/admin/quan-ly-loai-tiet-kiem" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg">
                        <span class="material-icons-outlined">settings_suggest</span>Quản lý loại tiết kiệm</a></li>
                </ul>
            </div>
            <div>
                <p class="px-4 text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Nghiệp vụ</p>
                <ul class="space-y-1">
                    <li><a href="/admin/giao-dich" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg">
                        <span class="material-icons-outlined">swap_horiz</span>Giao dịch (Gửi/Rút)</a></li>
                    <li><a href="/admin/tra-cuu-so" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg">
                        <span class="material-icons-outlined">manage_search</span>Tra cứu sổ</a></li>
                    <li><a href="/admin/bao-cao-thong-ke" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg">
                        <span class="material-icons-outlined">bar_chart</span>Báo cáo doanh số</a></li>
                </ul>
            </div>
        </nav>
    </aside>


    <!-- Main -->
    <main class="flex-1 overflow-y-auto flex flex-col">
        <header class="h-16 bg-white border-b border-gray-200 px-8 flex items-center justify-between sticky top-0 z-10">
            <h2 class="text-xl font-bold text-slate-800">Thêm khách hàng mới</h2>
        </header>

        <div class="p-8">
            <div class="max-w-3xl mx-auto bg-white rounded-2xl border border-gray-100 shadow-sm p-8">
                <!-- Form thêm khách hàng -->
                <form th:action="@{/admin/quan-ly-khach-hang/them}" th:object="${khachHang}" method="post" class="space-y-6">

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Họ và tên</label>
                        <input type="text" th:field="*{hoten}" class="w-full border border-gray-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20" placeholder="Nhập họ tên">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Giới tính</label>
                        <select th:field="*{gioiTinh}" class="w-full border border-gray-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20">
                            <option value="Nam">Nam</option>
                            <option value="Nữ">Nữ</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Số điện thoại</label>
                        <input type="text" th:field="*{sdt}" class="w-full border border-gray-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20" placeholder="Nhập số điện thoại">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">CMND/CCCD</label>
                        <input type="text" th:field="*{cccd}" class="w-full border border-gray-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20" placeholder="Nhập số CMND/CCCD">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Địa chỉ</label>
                        <input type="text" th:field="*{diaChi}" class="w-full border border-gray-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20" placeholder="Nhập địa chỉ">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                        <input type="email" th:field="*{email}" class="w-full border border-gray-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20" placeholder="Nhập email">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Ngày sinh</label>
                        <input type="date" th:field="*{ngaySinh}" class="w-full border border-gray-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20">
                    </div>

                    <!-- Nút hành động -->
                    <div class="pt-6 border-t flex justify-end gap-3">
                        <a href="/admin/quan-ly-khach-hang" class="px-6 py-2.5 border border-gray-200 rounded-xl hover:bg-gray-50 transition">Hủy</a>
                        <button type="submit" class="px-6 py-2.5 bg-blue-600 text-white rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-200 transition">Lưu khách hàng</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>
