<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Mở tài khoản - MyBank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#f8fafc] min-h-screen flex items-center justify-center p-4">
<div class="max-w-2xl w-full bg-white rounded-[2.5rem] shadow-2xl p-10 md:p-16 border border-slate-100">
    <div class="text-center mb-10">
        <h2 class="text-3xl font-black text-slate-800 tracking-tight">Mở tài khoản MyBank</h2>
        <p class="text-slate-500 mt-2 font-medium">Bắt đầu hành trình tích lũy tài sản của bạn hôm nay</p>
    </div>
    <div th:if="${errorMessage}" class="bg-red-100 text-red-700 p-3 rounded-xl mb-6 text-center font-bold">
        <p th:text="${errorMessage}"></p>
    </div>
    <div th:if="${successMessage}" class="bg-green-100 text-green-700 p-3 rounded-xl mb-6 text-center font-bold">
        <p th:text="${successMessage}"></p>
    </div>

    <!-- Form đăng ký khớp với KhachHang -->
    <form action="/register" method="post" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-[10px] font-black uppercase text-slate-400 mb-2">Họ và Tên</label>
                <input type="text" name="hoten" placeholder="Nguyễn Văn A"
                       class="w-full bg-slate-50 border-2 focus:border-blue-600 rounded-2xl p-4 font-bold transition-all" required>
            </div>
            <div>
                <label class="block text-[10px] font-black uppercase text-slate-400 mb-2">Số CCCD</label>
                <input type="text" name="cccd" placeholder="07909000xxxx"
                       class="w-full bg-slate-50 border-2 focus:border-blue-600 rounded-2xl p-4 font-bold transition-all" required>
            </div>
        </div>

        <div>
            <label class="block text-[10px] font-black uppercase text-slate-400 mb-2">Email</label>
            <input type="text" name="email" placeholder="xxxxgmail.com"
                   class="w-full bg-slate-50 border-2 focus:border-blue-600 rounded-2xl p-4 font-bold transition-all">
        </div>

        <div>
            <label class="block text-[10px] font-black uppercase text-slate-400 mb-2">Số điện thoại</label>
            <input type="text" name="sdt" placeholder="0912345678"
                   class="w-full bg-slate-50 border-2 focus:border-blue-600 rounded-2xl p-4 font-bold transition-all" required>
        </div>
        <div>
            <label class="block text-[10px] font-black uppercase text-slate-400 mb-2">Giới tính</label>
            <select name="gioiTinh" class="w-full bg-slate-50 border-2 focus:border-blue-600 rounded-2xl p-4 font-bold transition-all" required>
                <option value="">-- Chọn giới tính --</option>
                <option value="Nam">Nam</option>
                <option value="Nữ">Nữ</option>
                <option value="Khác">Khác</option>
            </select>
        </div>

        <div>
            <label class="block text-[10px] font-black uppercase text-slate-400 mb-2">Địa chỉ</label>
            <input type="text" name="diaChi" placeholder="Hà Nội"
                   class="w-full bg-slate-50 border-2 focus:border-blue-600 rounded-2xl p-4 font-bold transition-all">
        </div>

        <div>
            <label class="block text-[10px] font-black uppercase text-slate-400 mb-2">Ngày sinh</label>
            <input type="date" name="ngaySinh"
                   class="w-full bg-slate-50 border-2 focus:border-blue-600 rounded-2xl p-4 font-bold transition-all">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-[10px] font-black uppercase text-slate-400 mb-2">Mật khẩu</label>
                <input type="password" name="password" placeholder="••••••••"
                       class="w-full bg-slate-50 border-2 focus:border-blue-600 rounded-2xl p-4 font-bold transition-all" required>
            </div>
            <div>
                <label class="block text-[10px] font-black uppercase text-slate-400 mb-2">Xác nhận mật khẩu</label>
                <input type="password" name="confirmPassword" placeholder="••••••••"
                       class="w-full bg-slate-50 border-2 focus:border-blue-600 rounded-2xl p-4 font-bold transition-all" required>
            </div>
        </div>

        <div class="flex items-start gap-3 p-2">
            <input type="checkbox" class="mt-1 w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500" required>
            <p class="text-[11px] text-slate-500 font-medium">Tôi đồng ý với các điều khoản sử dụng và chính sách bảo mật của MyBank.</p>
        </div>

        <button type="submit" class="w-full bg-[#0f172a] text-white py-5 rounded-[2rem] font-black text-lg shadow-xl hover:bg-blue-600 transition-all transform hover:scale-[1.01]">
            HOÀN TẤT ĐĂNG KÝ
        </button>

    </form>

    <p class="mt-8 text-center text-sm font-medium text-slate-500">
        Đã có tài khoản? <a href="/login" class="text-blue-600 font-bold hover:underline">Đăng nhập ngay</a>
    </p>
</div>
</body>
</html>
