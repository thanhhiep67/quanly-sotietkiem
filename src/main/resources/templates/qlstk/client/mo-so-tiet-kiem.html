<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Mở sổ tiết kiệm mới - MyBank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#f8fafc] text-slate-900">
<div class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-72 bg-[#0f172a] text-slate-400 flex flex-col shadow-2xl">
        <div class="p-8 border-b border-slate-800">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-xl text-white">
                    <span class="material-symbols-outlined">account_balance_wallet</span>
                </div>
                <h1 class="text-white text-xl font-bold tracking-tight">MyBank</h1>
            </div>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2 text-sm">
            <a href="/" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition">
                <span class="material-symbols-outlined">grid_view</span> Tổng quan
            </a>
            <a href="tra-cuu-so" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition">
                <span class="material-symbols-outlined">receipt_long</span> Sổ tiết kiệm
            </a>
            <a href="giao-dich" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition">
                <span class="material-symbols-outlined">history</span> Giao dịch
            </a>
            <a href="lai-suat" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition">
                <span class="material-symbols-outlined">percent</span> Lãi suất
            </a>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <a href="login.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:bg-red-500/10 font-semibold transition">
                <span class="material-symbols-outlined">logout</span> Đăng xuất
            </a>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 overflow-y-auto p-8">
        <div class="max-w-3xl mx-auto space-y-8">
            <div class="text-center">
                <h2 class="text-3xl font-black text-slate-800">Mở Sổ Tiết Kiệm</h2>
                <p class="text-slate-500">Chỉ mất 2 phút để bắt đầu kế hoạch tích lũy của bạn</p>
            </div>

            <div class="bg-white p-10 rounded-[2.5rem] border border-slate-100 shadow-xl">
                <form th:action="@{/mo-so-tiet-kiem}" method="post" class="space-y-6">
                    <!-- Loại sổ -->
                    <div>
                        <label class="block text-xs font-black uppercase text-slate-400 tracking-widest mb-2">
                            Loại tiết kiệm
                        </label>
                        <select id="loaiSo" name="loaiSoId"
                                class="w-full bg-slate-50 border-none rounded-2xl p-4 focus:ring-2 focus:ring-blue-600 outline-none font-bold text-slate-700">
                            <option th:each="loai : ${loaiSoList}"
                                    th:value="${loai.id}"
                                    th:data-lai="${loai.laiSuatNam}"
                                    th:data-kyhan="${loai.kyHanThang}"
                                    th:text="${'Kỳ hạn ' + loai.kyHanThang + ' tháng - Lãi suất ' + loai.laiSuatNam + '%/năm'}">
                            </option>
                        </select>
                    </div>

                    <!-- Số tiền + Ngày gửi -->
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-black uppercase text-slate-400 tracking-widest mb-2">Số tiền gửi (VND)</label>
                            <input type="number" id="soTienGui" name="soTienGui" placeholder="Tối thiểu 100.000"
                                   class="w-full bg-slate-50 border-none rounded-2xl p-4 focus:ring-2 focus:ring-blue-600 outline-none font-bold">
                        </div>
                        <div>
                            <label class="block text-xs font-black uppercase text-slate-400 tracking-widest mb-2">Ngày gửi</label>
                            <input type="text" value="16/01/2026" disabled
                                   class="w-full bg-slate-100 border-none rounded-2xl p-4 text-slate-400 font-bold cursor-not-allowed">
                        </div>
                    </div>

                    <!-- Kết quả -->
                    <div class="p-6 bg-blue-50 rounded-3xl border border-blue-100">
                        <div class="flex justify-between items-center">
                            <span class="text-blue-600 font-bold">Tiền lãi ước tính:</span>
                            <span id="laiUocTinh" class="text-xl font-black text-blue-700">~ 0 đ</span>
                        </div>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-blue-600 font-bold">Tổng tiền nhận (gốc + lãi):</span>
                            <span id="tongTien" class="text-xl font-black text-green-700">~ 0 đ</span>
                        </div>
                        <div id="errorMsg" class="text-red-600 font-bold mt-2 hidden">Số tiền tối thiểu là 100.000 VND</div>
                    </div>

                    <!-- Thông báo -->
                    <div th:if="${message}" class="p-4 bg-green-100 text-green-700 rounded-xl">
                        <p th:text="${message}"></p>
                    </div>

                    <!-- Submit -->
                    <button id="submitBtn" type="submit"
                            class="w-full bg-blue-600 text-white py-5 rounded-3xl font-black text-lg shadow-xl shadow-blue-200 hover:bg-blue-700 transition transform hover:scale-[1.02]">
                        XÁC NHẬN MỞ SỔ
                    </button>
                </form>
            </div>
        </div>
    </main>
</div>

<<script>
    function tinhLai() {
        const select = document.getElementById("loaiSo");
        const kyHanThang = parseInt(select.options[select.selectedIndex].dataset.kyhan);
        const laiSuatNam = parseFloat(select.options[select.selectedIndex].dataset.lai);

        const soTien = parseFloat(document.getElementById("soTienGui").value) || 0;

        const errorMsg = document.getElementById("errorMsg");
        const submitBtn = document.getElementById("submitBtn");

        // Validation số tiền tối thiểu
        if (soTien > 0 && soTien < 100000) {
            errorMsg.classList.remove("hidden");
            submitBtn.disabled = true;
            submitBtn.classList.add("opacity-50", "cursor-not-allowed");
        } else {
            errorMsg.classList.add("hidden");
            submitBtn.disabled = false;
            submitBtn.classList.remove("opacity-50", "cursor-not-allowed");
        }

        // Công thức: lãi = gốc * (lãi suất/100) * (kỳ hạn / 12)
        const laiUocTinh = soTien * (laiSuatNam / 100) * (kyHanThang / 12);
        const tongTien = soTien + laiUocTinh;

        // Format số tiền
        const format = (num) => num.toLocaleString("vi-VN") + " đ";

        document.getElementById("laiUocTinh").textContent = "~ " + format(laiUocTinh);
        document.getElementById("tongTien").textContent = "~ " + format(tongTien);
    }

    // Gắn sự kiện
    document.getElementById("loaiSo").addEventListener("change", tinhLai);
    document.getElementById("soTienGui").addEventListener("input", tinhLai);

    // Tính ngay khi load trang
    window.addEventListener("DOMContentLoaded", tinhLai);
</script>
