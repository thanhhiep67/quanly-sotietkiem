<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Bảng lãi suất - MyBank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#f8fafc] text-slate-900">
<div class="flex h-screen overflow-hidden">
    <aside class="w-72 bg-[#0f172a] text-slate-400 flex flex-col shadow-2xl">
        <div class="p-8 border-b border-slate-800">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-xl text-white shadow-lg"><span class="material-symbols-outlined">account_balance_wallet</span></div>
                <h1 class="text-white text-xl font-bold tracking-tight">MyBank</h1>
            </div>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2 text-sm">
            <a href="/" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition"><span class="material-symbols-outlined">grid_view</span> Tổng quan</a>
            <a href="tra-cuu-so" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition"><span class="material-symbols-outlined">receipt_long</span> Sổ tiết kiệm</a>
            <a href="giao-dich" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition"><span class="material-symbols-outlined">history</span> Giao dịch</a>
            <a href="lai-suat" class="bg-blue-600 text-white flex items-center gap-3 px-4 py-3 rounded-xl shadow-lg"><span class="material-symbols-outlined">percent</span> Lãi suất</a>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <a href="logout" class="flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:bg-red-500/10 transition font-semibold"><span class="material-symbols-outlined">logout</span> Đăng xuất</a>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-8">
        <div class="max-w-6xl mx-auto space-y-12">
            <div class="text-center">
                <h2 class="text-4xl font-black text-slate-800 tracking-tighter">Bảng Lãi Suất Tiết Kiệm</h2>
                <p class="text-slate-500 mt-2">Cập nhật mới nhất ngày <span th:text="${ngayCapNhat}"></span></p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div th:each="item : ${laiSuatList}"
                     class="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm hover:shadow-xl transition-all">
                    <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mb-8">
                        <span class="material-symbols-outlined text-4xl">percent</span>
                    </div>
                    <h3 class="text-2xl font-bold text-slate-800 mb-2"
                        th:text="${item.loaiSo.kyHanThang == null ? 'Không kỳ hạn' : item.loaiSo.kyHanThang + ' Tháng'}"></h3>
                    <p class="text-slate-500 text-sm mb-8">Lãi suất áp dụng cho loại sổ này.</p>
                    <div class="flex items-baseline gap-1 mb-10">
            <span class="text-5xl font-black text-blue-600"
                  th:text="${item.laiSuat != null ? item.laiSuat.laiSuatNam + '%' : 'N/A'}"></span>
                        <span class="text-slate-400 font-bold">/năm</span>
                    </div>
                    <a href="/mo-so-tiet-kiem" class="block w-full text-center py-4 bg-slate-100 text-slate-600 font-bold rounded-2xl hover:bg-blue-600 hover:text-white transition-all">Mở sổ ngay</a>
                </div>
            </div>


        </div>
    </main>
</div>
</body>
</html>
